<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>الامبراطور - أيمن أبوزيد</title>

  <meta property="og:title" content="السيرة الذاتية - أيمن أبوزيد">
  <meta property="og:description" content="ملف شخصي أيمن أبوزيد (الامبراطور)">
  <meta property="og:image" content="as100k.jpg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="as100k.jpg" type="image/jpeg">

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #00ff00;
      --secondary-color: #ff3366;
      --accent-color: #8822ff;
      --dark-bg: #0a0a0a;
      --card-bg: rgba(20, 20, 30, 0.7);
      --circle-size: min(380px, 70vw, 70vh);
      --icon-radius: calc(var(--circle-size) / 2.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background-color: var(--dark-bg);
      color: #fff;
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0, 255, 0, 0.05) 0%, transparent 20%),
        radial-gradient(circle at 80% 70%, rgba(136, 34, 255, 0.05) 0%, transparent 20%),
        radial-gradient(circle at 40% 80%, rgba(255, 51, 102, 0.05) 0%, transparent 20%);
    }

    .scene {
      width: 100%;
      min-height: 100vh;
      position: relative;
      padding-top: 20px;
      padding-bottom: 40px;
    }

    header {
      text-align: center;
      padding: 20px 20px 10px;
      position: relative;
      z-index: 10;
    }

    .profile-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 25px;
      margin-bottom: 20px;
      position: relative;
      flex-direction: column;
    }

    #profile-img {
      max-width: 180px;
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 50%;
      box-shadow: 0 0 30px var(--primary-color), inset 0 0 20px rgba(0, 255, 0, 0.3);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 3px solid transparent;
      background: linear-gradient(45deg, var(--primary-color), var(--accent-color), var(--secondary-color)) border-box;
      position: relative;
      z-index: 2;
    }

    #profile-img:hover {
      transform: rotateY(20deg) scale(1.08);
      box-shadow: 0 0 50px var(--primary-color), inset 0 0 30px rgba(0, 255, 0, 0.5);
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2rem);
      margin-bottom: 10px;
      color: #fff;
      text-shadow: 0 0 10px var(--primary-color), 0 0 20px rgba(0, 255, 0, 0.5);
      position: relative;
      display: inline-block;
      padding: 0 20px;
    }

    h1::before,
    h1::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary-color));
      transform: translateY(-50%);
    }

    h1::before {
      right: -20px;
      background: linear-gradient(90deg, var(--primary-color), transparent);
    }

    h1::after {
      left: -20px;
    }

    .description {
      text-align: center;
      padding: 20px;
      margin: 20px auto;
      max-width: 700px;
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 255, 0, 0.2), inset 0 0 20px rgba(0, 255, 0, 0.1);
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      line-height: 1.8;
      border: 1px solid rgba(0, 255, 0, 0.2);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .description::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary-color), var(--accent-color), var(--secondary-color));
      animation: borderGlow 3s infinite linear;
    }

    @keyframes borderGlow {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    /* تصميم أزرار التواصل */
    .contact-buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      margin: 30px auto;
      max-width: 900px;
      padding: 0 15px;
      z-index: 10;
      position: relative;
    }

    .contact-btn {
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 15px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      min-width: 180px;
      justify-content: center;
      font-size: clamp(0.85rem, 2vw, 1rem);
      position: relative;
      overflow: hidden;
      z-index: 2;
      backdrop-filter: blur(5px);
    }

    .contact-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(100%);
      transition: transform 0.4s ease;
      z-index: -1;
    }

    .contact-btn:hover::before {
      transform: translateY(0);
    }

    .contact-btn i {
      font-size: 1.3rem;
      transition: transform 0.3s;
    }

    .contact-btn:hover i {
      transform: scale(1.2) rotate(10deg);
    }

    .projects-btn { background: linear-gradient(135deg, rgba(255, 153, 51, 0.9), rgba(255, 102, 0, 0.9)); box-shadow: 0 5px 25px rgba(255, 153, 51, 0.5); border: 1px solid rgba(255, 153, 51, 0.3); }
    .services-btn { background: linear-gradient(135deg, rgba(51, 204, 51, 0.9), rgba(0, 153, 0, 0.9)); box-shadow: 0 5px 25px rgba(51, 204, 51, 0.5); border: 1px solid rgba(51, 204, 51, 0.3); }
    .whatsapp-btn { background: linear-gradient(135deg, rgba(37, 211, 102, 0.9), rgba(18, 140, 126, 0.9)); box-shadow: 0 5px 25px rgba(37, 211, 102, 0.5); border: 1px solid rgba(37, 211, 102, 0.3); }
    .telegram-btn { background: linear-gradient(135deg, rgba(0, 136, 204, 0.9), rgba(0, 85, 128, 0.9)); box-shadow: 0 5px 25px rgba(0, 136, 204, 0.5); border: 1px solid rgba(0, 136, 204, 0.3); }

    .contact-btn:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }

    /* تصميم دائرة الأيقونات المتساوية - تم إصلاح التداخل */
    .social-circle {
      position: relative;
      width: 100%;
      min-height: 400px;
      margin: 20px auto;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 0;
    }

    .circle-container {
      position: relative;
      width: var(--circle-size);
      height: var(--circle-size);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .orbit-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid rgba(0, 255, 0, 0.2);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.3), inset 0 0 20px rgba(0, 255, 0, 0.1);
      animation: rotateRing 20s linear infinite;
    }

    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .center-core {
      position: absolute;
      width: clamp(60px, 15vw, 80px);
      height: clamp(60px, 15vw, 80px);
      background: radial-gradient(circle, var(--primary-color), transparent 70%);
      border-radius: 50%;
      box-shadow: 0 0 50px var(--primary-color);
      animation: pulse 3s infinite alternate;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .center-core i {
      font-size: clamp(1.5rem, 4vw, 2rem);
      color: #000;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.1); opacity: 1; }
    }

    /* الأيقونات على الدائرة - إصلاح التوزيع */
    .circle-icon {
      position: absolute;
      width: clamp(55px, 13vw, 70px);
      height: clamp(55px, 13vw, 70px);
      border-radius: 50%;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 3;
      cursor: pointer;
      left: 50%;
      top: 50%;
      margin-left: calc(clamp(55px, 13vw, 70px) / -2);
      margin-top: calc(clamp(55px, 13vw, 70px) / -2);
    }

    .circle-icon a {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      text-decoration: none;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 10px var(--icon-color);
    }

    /* أيقونات Font Awesome داخل الدائرة */
    .circle-icon i {
      font-size: clamp(28px, 6vw, 40px);
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 5px currentColor);
      color: var(--icon-color);
    }

    /* ألوان مختلفة لكل أيقونة */
    .circle-icon:nth-child(3) { --icon-color: #ff0000; }      /* YouTube */
    .circle-icon:nth-child(4) { --icon-color: #25d366; }      /* WhatsApp */
    .circle-icon:nth-child(5) { --icon-color: #ffffff; }      /* GitHub */
    .circle-icon:nth-child(6) { --icon-color: #0088cc; }      /* Telegram */
    .circle-icon:nth-child(7) { --icon-color: #ff9800; }      /* Blogger */

    /* تأثير التوهج المتسلسل للأيقونات */
    @keyframes iconGlowPulse {
      0% {
        filter: drop-shadow(0 0 2px var(--icon-color));
        transform: scale(1);
      }
      50% {
        filter: drop-shadow(0 0 20px var(--icon-color));
        transform: scale(1.1);
      }
      100% {
        filter: drop-shadow(0 0 2px var(--icon-color));
        transform: scale(1);
      }
    }

    .circle-icon {
      animation: iconGlowPulse 2.5s infinite ease-in-out;
      animation-delay: calc(var(--order) * 0.3s);
    }

    .circle-icon:hover {
      transform: scale(1.2) !important;
      z-index: 10;
    }

    .circle-icon:hover a {
      background: rgba(0, 0, 0, 0.9);
      box-shadow: 0 0 30px var(--icon-color);
      border-color: var(--icon-color);
    }

    .circle-icon:hover i {
      transform: scale(1.15);
      filter: drop-shadow(0 0 15px currentColor);
    }

    /* عداد الزيارات */
    #counter {
      text-align: center;
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: #aaa;
      margin: 20px auto;
      background: var(--card-bg);
      border-radius: 15px;
      padding: 12px 20px;
      max-width: 220px;
      border: 1px solid rgba(0, 255, 0, 0.2);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(5px);
      z-index: 10;
      position: relative;
    }

    #comments {
      max-width: 600px;
      margin: 0 auto 30px;
      padding: 0 20px;
      z-index: 10;
      position: relative;
    }

    #comments h3, .comments-section h3 {
      font-size: clamp(1rem, 3vw, 1.2rem);
      margin-bottom: 15px;
      text-align: center;
      color: var(--primary-color);
      text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
    }

    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 15px;
      border: 1px solid rgba(0, 255, 0, 0.3);
      background: rgba(10, 10, 20, 0.7);
      color: #fff;
      margin: 10px 0;
      resize: vertical;
      min-height: 100px;
      font-size: clamp(0.9rem, 2vw, 1rem);
      transition: all 0.3s;
      backdrop-filter: blur(5px);
    }

    textarea:focus {
      box-shadow: 0 0 25px rgba(0, 255, 0, 0.5);
      outline: none;
      border-color: var(--primary-color);
    }

    button[type="submit"] {
      background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 15px;
      cursor: pointer;
      font-weight: bold;
      display: block;
      margin: 15px auto;
      transition: all 0.3s;
      font-size: clamp(0.85rem, 2vw, 1rem);
      min-width: 140px;
    }

    button[type="submit"]:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(136, 34, 255, 0.5);
    }

    .comments-section {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 20px;
      margin: 20px auto;
      max-width: 700px;
      border: 1px solid rgba(0, 255, 0, 0.2);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }

    .comment-item {
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(0, 255, 0, 0.2);
      transition: transform 0.3s;
      padding: 12px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.2);
    }

    .comment-item:hover {
      transform: translateY(-3px);
      background: rgba(0, 0, 0, 0.3);
    }

    .comment-date {
      color: #aaa;
      font-size: 0.75rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .comment-text {
      color: #fff;
      font-size: clamp(0.85rem, 2vw, 0.95rem);
      line-height: 1.6;
    }

    .admin-reply {
      background-color: rgba(0, 100, 255, 0.15);
      border-right: 3px solid #0064ff;
      padding: 10px;
      margin-top: 10px;
      border-radius: 0 10px 10px 0;
      position: relative;
      margin-right: 15px;
    }

    .admin-reply::before {
      content: '👑';
      position: absolute;
      right: -15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
    }

    /* زر AS */
    .theme-switcher {
      position: absolute;
      left: 20px;
      top: 10px;
      font-size: 24px;
      font-weight: bold;
      color: var(--primary-color);
      cursor: pointer;
      background: rgba(0, 0, 0, 0.8);
      padding: 12px 20px;
      border-radius: 20px;
      border: 2px solid rgba(0, 255, 0, 0.5);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
    }

    .theme-switcher::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, var(--primary-color), var(--accent-color), var(--secondary-color), var(--primary-color));
      border-radius: 22px;
      z-index: -1;
      opacity: 0.7;
      animation: borderRotate 3s linear infinite;
    }

    @keyframes borderRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .floating {
      animation: floating 6s ease-in-out infinite;
    }

    @keyframes floating {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .card-3d {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 18px;
      margin: 20px auto;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 255, 0, 0.3);
      backdrop-filter: blur(10px);
    }

    /* تأثيرات الفضاء */
    .space-char {
      position: fixed;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--primary-color);
      text-shadow: 0 0 10px currentColor;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      animation: floatSpace 20s linear infinite;
    }

    @keyframes floatSpace {
      0% {
        transform: translate(0, 100vh) rotate(0deg) scale(0.5);
        opacity: 0;
      }
      5% { opacity: 1; }
      95% { opacity: 1; }
      100% {
        transform: translate(calc(100vw * var(--tx)), -100px) rotate(720deg) scale(2);
        opacity: 0;
      }
    }

    .theme-notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.9);
      color: var(--primary-color);
      padding: 12px 20px;
      border-radius: 10px;
      border: 1px solid var(--primary-color);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
      z-index: 1000;
      transform: translateY(-100px);
      transition: transform 0.5s ease;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(0.8rem, 2vw, 0.9rem);
    }

    .theme-notification.show {
      transform: translateY(0);
    }

    .page-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 10, 0.98);
      z-index: 2000;
      display: none;
      animation: frameFadeIn 0.4s ease-out;
      backdrop-filter: blur(10px);
    }

    @keyframes frameFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: rgba(20, 20, 30, 0.95);
      border-bottom: 2px solid rgba(0, 255, 0, 0.3);
      flex-wrap: wrap;
      gap: 10px;
    }

    .page-title {
      font-size: clamp(1rem, 4vw, 1.2rem);
      color: var(--primary-color);
      text-shadow: 0 0 15px rgba(0, 255, 0, 0.7);
    }

    .close-frame {
      background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 15px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }

    .close-frame:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(136, 34, 255, 0.5);
    }

    .page-content {
      width: 100%;
      height: calc(100% - 70px);
    }

    .page-content iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    #matrix-canvas, #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .theme-switcher {
        width: 50px;
        height: 50px;
        font-size: 20px;
        left: 15px;
        top: 15px;
      }
      .contact-btn {
        min-width: 150px;
        padding: 10px 15px;
      }
    }
  </style>
</head>
<body>
  <div id="themeNotification" class="theme-notification">
    <i class="fas fa-info-circle"></i>
    <span id="themeMessage">🔴 جميع الثيمات معطلة</span>
  </div>

  <div id="pageFrame" class="page-frame">
    <div class="page-header">
      <div class="page-title" id="frameTitle"></div>
      <button class="close-frame" onclick="closePageFrame()">
        <i class="fas fa-times"></i> إغلاق
      </button>
    </div>
    <div class="page-content">
      <iframe id="frameContent" src=""></iframe>
    </div>
  </div>

  <div class="scene">
    <header class="floating">
      <div class="profile-container">
        <img id="profile-img" src="img.jpg" alt="صورة أيمن">
        <div class="theme-switcher" id="themeSwitcher">
          <span>AS</span>
        </div>
      </div>
      <h1>أيمن أبوزيد (الامبراطور)</h1>
    </header>
    
    <div class="description card-3d">
      <p>الاسم: أيمن أبوذيد من الاسكندريه – مصر.<br>
      الاهتمامات: التطور التكنولوجي، الاختراق الأخلاقي.<br>  
      الأمن السيبراني، أمن المعلومات، تطوير برمجيات بلغة PY & html & JS</p>
    </div>

    <div class="contact-buttons">
      <button class="contact-btn projects-btn" onclick="openPageFrame('مشاريعي', 'https://alambrator100k.github.io/My-projects/')">
        <i class="fas fa-project-diagram"></i>
        <span>مشاريعي</span>
      </button>
      <button class="contact-btn services-btn" onclick="openPageFrame('طلب خدمة إلكترونية', 'https://alambrator100k.github.io/Services/')">
        <i class="fas fa-laptop-code"></i>
        <span>طلب خدمه إلكترونية</span>
      </button>
      <button class="contact-btn whatsapp-btn" onclick="window.open('https://wa.me/qr/ZXYW3OTCX35TO1', '_blank')">
        <i class="fab fa-whatsapp"></i>
        <span>تواصل واتساب</span>
      </button>
      <button class="contact-btn telegram-btn" onclick="window.open('https://t.me/A_S_10k', '_blank')">
        <i class="fab fa-telegram"></i>
        <span>تواصل تلجرام</span>
      </button>
    </div>
    
    <!-- دائرة الأيقونات - تم إصلاح مشكلة التداخل -->
    <div class="social-circle">
      <div class="circle-container" id="circleContainer">
        <div class="orbit-ring"></div>
        <div class="center-core">
          <i class="fas fa-user-astronaut"></i>
        </div>
        
        <!-- يتم وضع الأيقونات بواسطة JavaScript لضمان التوزيع الصحيح -->
      </div>
    </div>
    
    <div id="counter" class="card-3d">
      <i class="fas fa-eye"></i> عدد الزيارات: <span id="visit-count">0</span>
    </div>
    
    <div id="comments">
      <h3><i class="fas fa-comment-alt"></i> أضف تعليق:</h3>
      <form id="comment-form">
        <textarea name="comment" required placeholder="اكتب تعليقك هنا..."></textarea>
        <button type="submit">
          <i class="fas fa-paper-plane"></i> إرسال
        </button>
      </form>
    </div>
    
    <div class="comments-section card-3d">
      <h3><i class="fas fa-comments"></i> التعليقات:</h3>
      <div id="comments-display">لا توجد تعليقات حتى الآن</div>
    </div>
  </div>

  <canvas id="matrix-canvas"></canvas>
  <canvas id="particle-canvas"></canvas>

  <script>
    // إعداد الأيقونات في الدائرة باستخدام JavaScript لضمان التوزيع الصحيح
    function setupCircleIcons() {
      const container = document.getElementById('circleContainer');
      if (!container) return;
      
      // حذف أي أيقونات موجودة مسبقاً (باستثناء orbit-ring و center-core)
      const existingIcons = container.querySelectorAll('.circle-icon');
      existingIcons.forEach(icon => icon.remove());
      
      const iconsData = [
        { icon: 'fab fa-youtube', color: '#ff0000', url: 'https://youtube.com/@alambrator_as?si=AxHk4jU5pw-KGo-R', name: 'يوتيوب' },
        { icon: 'fab fa-whatsapp', color: '#25d366', url: 'https://whatsapp.com/channel/0029Vasyo14F6sn0brA3PY0T', name: 'واتساب' },
        { icon: 'fab fa-github', color: '#ffffff', url: 'https://github.com/Alambrator100k', name: 'جيت هاب' },
        { icon: 'fab fa-telegram-plane', color: '#0088cc', url: 'https://t.me/as_bot_as', name: 'تلجرام' },
        { icon: 'fab fa-blogger-b', color: '#ff9800', url: 'https://alambratoras.blogspot.com/?m=1', name: 'بلوجر' }
      ];
      
      const count = iconsData.length;
      const radius = container.offsetWidth / 2.2; // مسافة الأيقونات من المركز
      const iconSize = Math.min(container.offsetWidth * 0.15, 70);
      
      iconsData.forEach((data, index) => {
        const angle = (index * 360 / count) * (Math.PI / 180);
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        
        const iconDiv = document.createElement('div');
        iconDiv.className = 'circle-icon';
        iconDiv.style.setProperty('--icon-color', data.color);
        iconDiv.style.setProperty('--order', index);
        iconDiv.style.left = `calc(43% + ${x}px)`;
        iconDiv.style.top = `calc(40% + ${y}px)`;
        iconDiv.style.transform = 'translate(-50%, -50%)';
        iconDiv.style.width = `${iconSize}px`;
        iconDiv.style.height = `${iconSize}px`;
        iconDiv.style.margin = '0';
        
        const link = document.createElement('a');
        link.href = data.url;
        link.target = '_blank';
        
        const iconElement = document.createElement('i');
        iconElement.className = data.icon;
        
        link.appendChild(iconElement);
        iconDiv.appendChild(link);
        container.appendChild(iconDiv);
      });
    }
    
    // مراقبة تغيير حجم النافذة لإعادة توزيع الأيقونات
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        setupCircleIcons();
      }, 200);
    });
    
    let currentTheme = 'none';
    let pressStartTime = 0;
    let pressTimer = null;
    let spaceInterval = null;
    let particleNetwork = null;

    function openPageFrame(title, url) {
      document.getElementById('frameTitle').textContent = title;
      document.getElementById('frameContent').src = url;
      document.getElementById('pageFrame').style.display = 'block';
    }

    function closePageFrame() {
      document.getElementById('pageFrame').style.display = 'none';
      document.getElementById('frameContent').src = '';
    }

    function showThemeNotification(message) {
      const notification = document.getElementById('themeNotification');
      const messageElement = document.getElementById('themeMessage');
      messageElement.textContent = message;
      notification.classList.add('show');
      setTimeout(() => notification.classList.remove('show'), 3000);
    }

    const matrixCanvas = document.getElementById('matrix-canvas');
    const matrixCtx = matrixCanvas.getContext('2d');
    
    function resizeMatrixCanvas() {
      matrixCanvas.width = window.innerWidth;
      matrixCanvas.height = window.innerHeight;
    }
    
    window.addEventListener('resize', resizeMatrixCanvas);
    resizeMatrixCanvas();
    
    const matrixChars = "◆◈◇⑅✯☯☽♘♛♖♟♞֍֎※⇝❃❆❅✰✵✧⚝☄☼☃☠☣☢𖤐𖣔☯@#$%&*";
    const matrixFontSize = 14;
    let matrixColumns = Math.floor(matrixCanvas.width / matrixFontSize);
    const matrixDrops = Array(matrixColumns).fill(1);
    
    function drawMatrix() {
      if (currentTheme !== 'matrix') {
        matrixCtx.clearRect(0, 0, matrixCanvas.width, matrixCanvas.height);
        return;
      }
      matrixCtx.fillStyle = 'rgba(5, 5, 10, 0.05)';
      matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
      matrixColumns = Math.floor(matrixCanvas.width / matrixFontSize);
      for (let i = 0; i < matrixColumns; i++) {
        const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
        const depth = Math.random() * 0.8 + 0.2;
        const colorValue = Math.floor(50 + depth * 205);
        matrixCtx.fillStyle = `rgba(0, ${colorValue}, 0, ${depth})`;
        const currentFontSize = matrixFontSize * (0.5 + depth * 0.5);
        matrixCtx.font = `${currentFontSize}px monospace`;
        const x = i * matrixFontSize;
        if (matrixDrops[i] * matrixFontSize > matrixCanvas.height || Math.random() > 0.95) matrixDrops[i] = 0;
        matrixCtx.fillText(text, x, matrixDrops[i] * matrixFontSize);
        matrixDrops[i]++;
      }
      requestAnimationFrame(drawMatrix);
    }

    function createSpaceChar() {
      if (currentTheme !== 'space') return;
      const char = document.createElement('div');
      char.className = 'space-char';
      char.textContent = matrixChars[Math.floor(Math.random() * matrixChars.length)];
      const colors = ['#00ff00', '#8822ff', '#ff9933', '#33cc33', '#0088cc'];
      char.style.color = colors[Math.floor(Math.random() * colors.length)];
      char.style.left = `${Math.random() * 100}vw`;
      char.style.top = `10vh`;
      char.style.setProperty('--tx', Math.random() * 2 - 1);
      const size = Math.random() * 0.5 + 1;
      char.style.fontSize = `${size}rem`;
      const duration = Math.random() * 10 + 15;
      char.style.animationDuration = `${duration}s`;
      document.body.appendChild(char);
      setTimeout(() => { if (char.parentNode) char.remove(); }, duration * 1000);
    }

    const particleCanvas = document.getElementById('particle-canvas');
    const particleCtx = particleCanvas.getContext('2d');

    function resizeParticleCanvas() {
      particleCanvas.width = window.innerWidth;
      particleCanvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeParticleCanvas);
    resizeParticleCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * particleCanvas.width;
        this.y = Math.random() * particleCanvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = Math.random() * 2 - 1;
        this.speedY = Math.random() * 2 - 1;
        this.color = `hsl(${Math.random() * 60 + 120}, 100%, 50%)`;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x > particleCanvas.width) this.speedX = -Math.abs(this.speedX);
        if (this.x < 0) this.speedX = Math.abs(this.speedX);
        if (this.y > particleCanvas.height) this.speedY = -Math.abs(this.speedY);
        if (this.y < 0) this.speedY = Math.abs(this.speedY);
      }
      draw() {
        particleCtx.fillStyle = this.color;
        particleCtx.beginPath();
        particleCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        particleCtx.fill();
      }
    }

    function initParticleNetwork() {
      particleNetwork = [];
      const particleCount = Math.floor((particleCanvas.width * particleCanvas.height) / 10000);
      for (let i = 0; i < particleCount; i++) particleNetwork.push(new Particle());
    }

    function drawParticleNetwork() {
      if (currentTheme !== 'particle') {
        particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
        return;
      }
      particleCtx.fillStyle = 'rgba(5, 5, 10, 0.05)';
      particleCtx.fillRect(0, 0, particleCanvas.width, particleCanvas.height);
      particleNetwork.forEach(particle => { particle.update(); particle.draw(); });
      particleCtx.strokeStyle = 'rgba(0, 255, 0, 0.1)';
      particleCtx.lineWidth = 0.5;
      for (let i = 0; i < particleNetwork.length; i++) {
        for (let j = i + 1; j < particleNetwork.length; j++) {
          const dx = particleNetwork[i].x - particleNetwork[j].x;
          const dy = particleNetwork[i].y - particleNetwork[j].y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < 100) {
            particleCtx.beginPath();
            particleCtx.moveTo(particleNetwork[i].x, particleNetwork[i].y);
            particleCtx.lineTo(particleNetwork[j].x, particleNetwork[j].y);
            particleCtx.stroke();
          }
        }
      }
      requestAnimationFrame(drawParticleNetwork);
    }

    function setTheme(theme) {
      switch(currentTheme) {
        case 'space':
          if (spaceInterval) clearInterval(spaceInterval);
          document.querySelectorAll('.space-char').forEach(el => el.remove());
          break;
      }
      currentTheme = theme;
      switch(theme) {
        case 'none':
          showThemeNotification('🔴 جميع الثيمات معطلة');
          matrixCtx.clearRect(0, 0, matrixCanvas.width, matrixCanvas.height);
          particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
          break;
        case 'matrix':
          showThemeNotification('🟢 تساقط المصفوفة مفعل');
          drawMatrix();
          break;
        case 'space':
          showThemeNotification('🔵 تأثير الفضاء مفعل');
          spaceInterval = setInterval(createSpaceChar, 300);
          for (let i = 0; i < 15; i++) setTimeout(() => createSpaceChar(), i * 100);
          break;
        case 'particle':
          showThemeNotification('🟣 شبكة الجسيمات مفعلة');
          initParticleNetwork();
          drawParticleNetwork();
          break;
      }
    }

    const themeSwitcher = document.getElementById('themeSwitcher');
    themeSwitcher.addEventListener('mousedown', startPress);
    themeSwitcher.addEventListener('touchstart', startPress);
    themeSwitcher.addEventListener('mouseup', endPress);
    themeSwitcher.addEventListener('touchend', endPress);
    themeSwitcher.addEventListener('mouseleave', cancelPress);
    
    function startPress(e) {
      e.preventDefault();
      pressStartTime = Date.now();
      themeSwitcher.classList.add('pressing');
      pressTimer = setTimeout(() => {
        if (Date.now() - pressStartTime >= 3000) {
          themeSwitcher.classList.remove('pressing');
          const themes = ['none', 'matrix', 'space', 'particle'];
          const currentIndex = themes.indexOf(currentTheme);
          const nextIndex = (currentIndex + 1) % themes.length;
          setTheme(themes[nextIndex]);
        }
      }, 3000);
    }
    
    function endPress() {
      clearTimeout(pressTimer);
      themeSwitcher.classList.remove('pressing');
      if (Date.now() - pressStartTime < 3000) {
        if (currentTheme === 'none') setTheme('matrix');
        else setTheme('none');
      }
    }
    
    function cancelPress() {
      clearTimeout(pressTimer);
      themeSwitcher.classList.remove('pressing');
    }

    function updateVisitCount() {
      let visits = localStorage.getItem('visits');
      if (!visits) visits = 0;
      visits = parseInt(visits) + 1;
      localStorage.setItem('visits', visits);
      document.getElementById('visit-count').textContent = visits;
    }
    
    updateVisitCount();

    const BOT_TOKEN = '7144838322:AAEYLHsGFavk7BAlHqfcsV5XuXvOEadS6KA';
    const CHAT_ID = '6113061454';
    let lastCommentId = 0;

    function loadComments() {
      const comments = localStorage.getItem('comments');
      const commentsDisplay = document.getElementById('comments-display');
      if (!comments || comments === '[]') {
        commentsDisplay.innerHTML = '<div class="comment-item"><div class="comment-text">لا توجد تعليقات حتى الآن</div></div>';
        return;
      }
      try {
        const commentsArray = JSON.parse(comments);
        if (commentsArray.length === 0) {
          commentsDisplay.innerHTML = '<div class="comment-item"><div class="comment-text">لا توجد تعليقات حتى الآن</div></div>';
          return;
        }
        lastCommentId = commentsArray.reduce((max, comment) => Math.max(max, comment.id || 0), 0);
        commentsDisplay.innerHTML = '';
        commentsArray.forEach(comment => {
          const commentDiv = document.createElement('div');
          commentDiv.className = 'comment-item';
          const dateDiv = document.createElement('div');
          dateDiv.className = 'comment-date';
          dateDiv.innerHTML = `<i class="far fa-clock"></i> ${comment.date}`;
          const textDiv = document.createElement('div');
          textDiv.className = 'comment-text';
          textDiv.textContent = comment.text;
          commentDiv.appendChild(dateDiv);
          commentDiv.appendChild(textDiv);
          if (comment.replies && comment.replies.length > 0) {
            comment.replies.forEach(reply => {
              const replyDiv = document.createElement('div');
              replyDiv.className = 'admin-reply';
              const replyDateDiv = document.createElement('div');
              replyDateDiv.className = 'reply-date';
              replyDateDiv.innerHTML = `<i class="far fa-clock"></i> ${reply.date}`;
              const replyTextDiv = document.createElement('div');
              replyTextDiv.className = 'reply-text';
              replyTextDiv.textContent = reply.text;
              replyDiv.appendChild(replyDateDiv);
              replyDiv.appendChild(replyTextDiv);
              commentDiv.appendChild(replyDiv);
            });
          }
          commentsDisplay.appendChild(commentDiv);
        });
      } catch (e) {
        commentsDisplay.innerHTML = '<div class="comment-item"><div class="comment-text">لا توجد تعليقات حتى الآن</div></div>';
      }
    }

    async function sendToTelegram(commentText, commentId) {
      const now = new Date();
      const formattedDate = now.toLocaleString('ar-EG');
      const message = `💬 تعليق جديد (ID: ${commentId}):\n${commentText}\n\n📅 التاريخ: ${formattedDate}`;
      try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'HTML' })
        });
      } catch (error) { console.error('Error:', error); }
    }

    document.getElementById('comment-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const commentText = this.comment.value.trim();
      if (commentText) {
        const now = new Date();
        const formattedDate = now.toLocaleString('ar-EG');
        lastCommentId++;
        const commentId = lastCommentId;
        await sendToTelegram(commentText, commentId);
        let existingComments = localStorage.getItem('comments');
        if (!existingComments || existingComments === '[]') existingComments = [];
        else existingComments = JSON.parse(existingComments);
        const newComment = { id: commentId, text: commentText, date: formattedDate, replies: [] };
        existingComments.push(newComment);
        localStorage.setItem('comments', JSON.stringify(existingComments));
        this.comment.value = '';
        loadComments();
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      loadComments();
      drawMatrix();
      drawParticleNetwork();
      setTheme('none');
      setupCircleIcons(); // إعداد الأيقونات في الدائرة
    });
  </script>
</body>
  </html>
